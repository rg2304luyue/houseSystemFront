# ============================================================
# 链居 - Nginx 配置（生产环境）
# SPA 静态文件服务 + API 反向代理
# ============================================================

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ---- Gzip 压缩 ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml font/woff2 application/wasm;
    gzip_min_length 1000;

    # ---- 通用代理头 ----
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;

    # ---- 静态资源强缓存（Vite 构建产物的文件名带 content hash）----
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ---- API 反向代理 → 后端 Flask :5000 ----
    # 所有 /xxx/ 路径自动转发到后端，无需逐个配置
    location ~ ^/(user|houseinfo|chat-ai|comments|news|contracts|appointments|repaires|messages|rental|housedetail|admin|github|email-auth|sms|oss|celery|alipay|api/alipay)/ {
        proxy_pass http://backend:5000;
    }

    # Stable Diffusion API（去除 /sdApi 前缀后转发）
    location /sdApi/ {
        proxy_pass http://backend:5000/;
    }

    # ---- WebSocket (Socket.IO) ----
    location /socket.io/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ---- SPA 路由回退：非 API 路径全部返回 index.html ----
    location / {
        try_files $uri $uri/ /index.html;
    }
}
