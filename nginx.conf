# ============================================================
# 链居 - Nginx 配置（生产环境）
# SPA 静态文件服务 + API 反向代理
# ============================================================

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ---- Gzip 压缩 ----
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # ---- 通用代理头 ----
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;

    # ---- API 反向代理 → 后端 Flask :5000 ----
    location /user/        { proxy_pass http://backend:5000; }
    location /houseinfo/   { proxy_pass http://backend:5000; }
    location /chat-ai/     { proxy_pass http://backend:5000; }
    location /comments/    { proxy_pass http://backend:5000; }
    location /news/        { proxy_pass http://backend:5000; }
    location /contracts/   { proxy_pass http://backend:5000; }
    location /appointments/ { proxy_pass http://backend:5000; }
    location /repaires/    { proxy_pass http://backend:5000; }
    location /messages/    { proxy_pass http://backend:5000; }
    location /rental/      { proxy_pass http://backend:5000; }
    location /housedetail/ { proxy_pass http://backend:5000; }
    location /admin/       { proxy_pass http://backend:5000; }
    location /github/      { proxy_pass http://backend:5000; }
    location /email-auth/  { proxy_pass http://backend:5000; }
    location /sms/         { proxy_pass http://backend:5000; }
    location /oss/         { proxy_pass http://backend:5000; }
    location /celery/      { proxy_pass http://backend:5000; }
    location /alipay/      { proxy_pass http://backend:5000; }
    location /sdApi/       { proxy_pass http://backend:5000/; }

    # ---- WebSocket (Socket.IO) ----
    location /socket.io/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ---- SPA 路由回退：非 API 路径全部返回 index.html ----
    location / {
        try_files $uri $uri/ /index.html;
    }
}
